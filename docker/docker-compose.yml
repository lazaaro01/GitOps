version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gitops
      POSTGRES_USER: gitops
      POSTGRES_PASSWORD: gitops
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitops"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://gitops:gitops@postgres:5432/gitops?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      API_PORT: 8080
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgres://gitops:gitops@postgres:5432/gitops?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      LOG_LEVEL: debug
      TF_WORK_DIR: /terraform/app
      API_URL: http://api:8080
    volumes:
      - ../terraform:/terraform
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
